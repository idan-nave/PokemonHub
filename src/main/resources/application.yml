spring:
  datasource:
    url: jdbc:h2:mem:testdb  # In-memory database (no file storage)
    driverClassName: org.h2.Driver
    username: sa
    password: password
    platform: h2
    hikari:
      maximum-pool-size: 10
    # Hibernate DDL mode
    ddl-auto: update  # Use `create` to recreate the schema on each application startup, `update` to automatically update schema

  h2:
    console:
      enabled: true  # Enable the H2 console for easy database browsing
      path: /h2-console  # Path to access the H2 console

  jpa:
    hibernate:
      ddl-auto: update  # Automatically update the schema
    show-sql: true  # Show SQL queries in the console
    properties:
      hibernate:
        format_sql: true  # Pretty print SQL queries

  logging:
    level:
      org.hibernate.SQL: DEBUG  # Enable logging of SQL queries
      org.hibernate.type.descriptor.sql.BasicBinder: TRACE  # Show bound values in the SQL queries
